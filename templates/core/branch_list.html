{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Філії</h1>
    {% if user.has_perm('core.add_branch') %}
    <a href="{% url 'core:branch_create' %}" class="btn btn-primary">Додати філію</a>
    {% endif %}
</div>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Назва</th>
            <th>Місто</th>
            <th>Статус</th>
        </tr>
    </thead>
    <tbody>
        {% for branch in branches %}
        <tr>
            <td>{{ branch.name }}</td>
            <td>{{ branch.city }}</td>
            <td>{{ branch.status }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3">Поки немає філій</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
